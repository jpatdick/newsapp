{% extends 'news/base.html' %}
{% block title %}Delete Newsletter - NewsApp{% endblock %}
{% block content %}
<div style="max-width:520px; margin:3rem auto;">
    <div class="card">
        <h1 style="font-size:1.4rem; margin-bottom:1rem;">Delete Newsletter</h1>
        <p style="color:#555; margin-bottom:1.5rem;">
            Are you sure you want to delete <strong>{{ newsletter.title }}</strong>?
            This action cannot be undone.
        </p>
        <form method="post" style="display:flex; gap:.8rem;">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Yes, delete</button>
            <a href="{% url 'newsletter_detail' newsletter.pk %}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
