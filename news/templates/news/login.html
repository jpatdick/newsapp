{% extends 'news/base.html' %}
{% block title %}Login - NewsApp{% endblock %}
{% block content %}
<div style="max-width:420px; margin:4rem auto;">
    <div class="card">
        <h1 style="font-size:1.5rem; margin-bottom:1.2rem; text-align:center;">NewsApp Login</h1>
        {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}
        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;">Log In</button>
        </form>
        <p style="text-align:center; margin-top:1rem; font-size:.88rem;">
            Don't have an account? <a href="{% url 'register' %}">Register here</a>
        </p>
    </div>
</div>
{% endblock %}
