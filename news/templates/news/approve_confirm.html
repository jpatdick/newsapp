{% extends 'news/base.html' %}
{% block title %}Approve Article - NewsApp{% endblock %}
{% block content %}
<div style="max-width:560px; margin:4rem auto;">
    <div class="card">
        <h1 style="font-size:1.4rem; margin-bottom:1rem;">Approve Article?</h1>
        <p style="margin-bottom:1.5rem;">Are you sure you want to approve <strong>"{{ article.title }}"</strong>?</p>
        <div style="display:flex; gap:.8rem;">
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-success">Yes, Approve</button>
            </form>
            <a href="{% url 'editor_dashboard' %}" class="btn btn-secondary">Cancel</a>
        </div>
    </div>
</div>
{% endblock %}
